<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Koreksi Esai AI</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- OCR -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

  <style>
    body {
      background: linear-gradient(to right, #4facfe, #00f2fe);
    }

    .card-custom {
      border-radius: 20px;
    }

    .feature-card {
      border-radius: 15px;
      padding: 15px;
      background: #f8f9fa;
    }
  </style>
</head>

<body>

<div class="container mt-5">

  <!-- Hero -->
  <div class="text-center text-white mb-5">
    <h1 class="fw-bold">📚 Koreksi Esai Otomatis</h1>
    <p>Membantu guru mengoreksi lebih cepat & mudah</p>
  </div>

  <!-- Fitur -->
  <div class="row text-center mb-4">
    <div class="col-md-4">
      <div class="feature-card">📸 Scan Jawaban</div>
    </div>
    <div class="col-md-4">
      <div class="feature-card">🤖 Koreksi Otomatis</div>
    </div>
    <div class="col-md-4">
      <div class="feature-card">📊 Nilai Instan</div>
    </div>
  </div>

  <!-- Aplikasi -->
  <div class="card shadow-lg p-4 card-custom">

    <h4 class="mb-3">Input Soal</h4>

    <div id="containerSoal"></div>
    <button class="btn btn-primary mb-3" onclick="tambahSoal()">+ Tambah Soal</button>

    <div class="mb-3">
      <label>Nama Siswa</label>
      <input type="text" id="nama" class="form-control">
    </div>

    <div class="mb-3">
      <label>Upload Foto Jawaban</label>
      <input type="file" id="gambar" class="form-control">
    </div>

    <button class="btn btn-success" onclick="proses()">Koreksi</button>
    <button class="btn btn-secondary" onclick="simpanNilai()">Simpan Nilai</button>

    <div id="hasil" class="mt-4"></div>

  </div>
</div>

<script>
let jumlahSoal = 0;

function tambahSoal() {
  jumlahSoal++;
  const div = document.createElement("div");
  div.className = "mb-3";
  div.innerHTML = `
    <div class="card p-3 mb-2">
      <b>Soal ${jumlahSoal}</b>
      <textarea class="form-control mt-2" placeholder="Jawaban kunci" id="kunci${jumlahSoal}"></textarea>
      <input type="number" class="form-control mt-2" placeholder="Bobot" id="bobot${jumlahSoal}" value="10">
    </div>
  `;
  document.getElementById("containerSoal").appendChild(div);
}

function hitungKemiripan(a, b) {
  a = a.toLowerCase().split(" ");
  b = b.toLowerCase().split(" ");
  let cocok = 0;
  a.forEach(kata => {
    if (b.includes(kata)) cocok++;
  });
  return (cocok / a.length);
}

async function proses() {
  const file = document.getElementById("gambar").files[0];
  const hasilDiv = document.getElementById("hasil");

  if (!file) {
    alert("Upload gambar dulu!");
    return;
  }

  hasilDiv.innerHTML = "⏳ Memproses...";

  const { data: { text } } = await Tesseract.recognize(file, 'eng');

  let totalNilai = 0;
  let totalBobot = 0;
  let detail = "";

  for (let i = 1; i <= jumlahSoal; i++) {
    const kunci = document.getElementById(kunci${i}).value;
    const bobot = parseFloat(document.getElementById(bobot${i}).value);

    if (!kunci) continue;

    const skor = hitungKemiripan(kunci, text);
    const nilai = skor * bobot;

    totalNilai += nilai;
    totalBobot += bobot;

    detail += Soal ${i}: ${nilai.toFixed(2)} / ${bobot}<br>;
  }

  const nilaiAkhir = (totalNilai / totalBobot) * 100;

  hasilDiv.innerHTML = `
    <div class="alert alert-info">
      <b>📄 Teks:</b><br>${text}<br><br>
      <b>📊 Detail:</b><br>${detail}<br>
      <b>🎯 Nilai Akhir:</b> ${nilaiAkhir.toFixed(2)}
    </div>
  `;

  window.nilaiTerakhir = nilaiAkhir;
}

function simpanNilai() {
  const nama = document.getElementById("nama").value;
  if (!nama || window.nilaiTerakhir === undefined) {
    alert("Isi nama dan koreksi dulu!");
    return;
  }

  let data = JSON.parse(localStorage.getItem("nilaiSiswa") || "[]");
  data.push({ nama: nama, nilai: window.nilaiTerakhir });
  localStorage.setItem("nilaiSiswa", JSON.stringify(data));

  alert("✅ Nilai tersimpan!");
}

// otomatis 1 soal
 tambahSoal();
</script>

</body>
</html>
